services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ritik
      POSTGRES_PASSWORD: secret123
      POSTGRES_DB: airflow_db
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
      - ./postgres/airflow_init.sql:/docker-entrypoint-initdb.d/airflow_init.sql
    networks:
      - my-networks

  af:
    image: apache/airflow:3.2.1
    restart: always
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://ritik:secret123@db:5432/airflow_db
    volumes:
      - ./airflow/dags:/opt/airflow/dags
    depends_on:
      - db
    networks:
      - my-networks
    command: >
      bash -c "airflow standalone"

networks:
  my-networks:
    driver: bridge
