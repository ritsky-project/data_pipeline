version: "3.9"

services:
  db:
    container_name: postgres
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ritik
      POSTGRES_PASSWORD: secret123
      POSTGRES_DB: WeatherDW
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

